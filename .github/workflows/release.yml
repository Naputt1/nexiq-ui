name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install

      - name: Build WASM
        run: pnpm build:wasm

      - name: Run Tests
        run: pnpm test

  release:
    name: Build and Release (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --mac
          - os: ubuntu-latest
            args: --linux
          - os: windows-latest
            args: --win

    steps:
      - name: Checkout UI
        uses: actions/checkout@v4
        with:
          path: ui

      - name: Checkout Monorepo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/nexiq
          path: nexiq

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Build Monorepo Extensions
        run: |
          cd nexiq
          pnpm install
          pnpm --filter @nexiq/shared build
          pnpm --filter @nexiq/extension-sdk build
          pnpm --filter @nexiq/component-extension build
          pnpm --filter @nexiq/file-extension build

      - name: Install UI dependencies and Link
        run: |
          cd ui
          pnpm install
          pnpm build:wasm
          pnpm link ../nexiq/packages/shared
          pnpm link ../nexiq/packages/extension-sdk
          pnpm link ../nexiq/packages/component-extension
          pnpm link ../nexiq/packages/file-extension

      - name: Build UI
        run: |
          cd ui
          pnpm build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            out/ui/release/**/*.dmg
            out/ui/release/**/*.zip
            out/ui/release/**/*.AppImage
            out/ui/release/**/*.exe
            out/ui/release/**/*.deb
            out/ui/release/**/*.rpm
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
